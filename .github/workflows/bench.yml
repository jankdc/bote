name: Bench report
env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'
'on':
  pull_request:
    paths:
      - 'packages/native/**'
      - 'packages/core/**'
      - 'packages/bench/**'
      - 'Cargo.*'
  workflow_dispatch: null
concurrency:
  group: bench-report-${{ github.ref }}
  cancel-in-progress: true
jobs:
  report:
    name: Report matrix
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run matrix
        run: npm run bench:matrix -w @botejs/bench -- --out "$GITHUB_WORKSPACE/matrix.jsonl"
      - name: Render report
        run: npm run bench:report -w @botejs/bench -- --in "$GITHUB_WORKSPACE/matrix.jsonl" --out "$GITHUB_WORKSPACE/report.md"
      - name: Build comment body
        id: report
        if: github.event_name == 'pull_request'
        run: |
          {
            echo 'body<<REPORT_EOF'
            echo '### Bench report'
            echo ''
            echo 'Matrix timings on `ubuntu-24.04`:'
            echo ''
            cat "$GITHUB_WORKSPACE/report.md"
            echo REPORT_EOF
          } >> "$GITHUB_OUTPUT"
      - name: Post comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: bench-report
          message: ${{ steps.report.outputs.body }}
